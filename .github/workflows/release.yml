name: Tag Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 5.1). Must be greater than the current versionName in app/build.gradle."
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag-release:
    name: Bump version & push tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so bumpversion.sh can compare versions and commit.
          fetch-depth: 0
          # Use a PAT or the default GITHUB_TOKEN — the pushed tag needs to
          # trigger the Build APK workflow's `on: push: tags: ["v*"]` event.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        run: |
          chmod +x ./bumpversion.sh
          ./bumpversion.sh "${{ inputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD
          git push origin "v${{ inputs.version }}"
