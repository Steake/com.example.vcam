name: Build APK

on:
  push:
    branches: [main, master, "copilot/**"]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    outputs:
      apk_path: ${{ steps.apk.outputs.apk_path }}
      apk_sha256: ${{ steps.apk.outputs.apk_sha256 }}
      release_apk_path: ${{ steps.apk.outputs.release_apk_path }}
      release_apk_sha256: ${{ steps.apk.outputs.release_apk_sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      # Tag pushes also produce a release-build APK (debug-keystore signed —
      # the project doesn't ship a release signing key, and this is an
      # LSPosed module, not a Play target). Keeps tag artifacts usable by
      # end users via `adb install` / sideload without rebuilding locally.
      - name: Build release APK (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          VERSION=${GITHUB_REF_NAME//\//-}
          DEST="vcam-${VERSION}-debug.apk"
          cp "$APK" "$DEST"
          APK_SHA256=$(sha256sum "$DEST" | awk '{print $1}')
          printf '%s  %s\n' "$APK_SHA256" "$DEST" | tee "${DEST}.sha256"
          echo "apk_path=$DEST" >> "$GITHUB_OUTPUT"
          echo "apk_sha256=$APK_SHA256" >> "$GITHUB_OUTPUT"

          # Tag-only: locate the release APK as well.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            REL_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
            if [ -z "$REL_APK" ]; then
              echo "Tag build but no release APK produced" >&2
              exit 1
            fi
            REL_DEST="vcam-${VERSION}-release.apk"
            cp "$REL_APK" "$REL_DEST"
            REL_SHA256=$(sha256sum "$REL_DEST" | awk '{print $1}')
            printf '%s  %s\n' "$REL_SHA256" "$REL_DEST" | tee "${REL_DEST}.sha256"
            echo "release_apk_path=$REL_DEST" >> "$GITHUB_OUTPUT"
            echo "release_apk_sha256=$REL_SHA256" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcam-debug-apk
          path: |
            ${{ steps.apk.outputs.apk_path }}
            ${{ steps.apk.outputs.apk_path }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload release APK artifact (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: vcam-release-apk
          path: |
            ${{ steps.apk.outputs.release_apk_path }}
            ${{ steps.apk.outputs.release_apk_path }}.sha256
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: vcam-debug-apk
          path: release-artifacts

      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: vcam-release-apk
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/${{ needs.build.outputs.apk_path }}
            release-artifacts/${{ needs.build.outputs.apk_path }}.sha256
            release-artifacts/${{ needs.build.outputs.release_apk_path }}
            release-artifacts/${{ needs.build.outputs.release_apk_path }}.sha256
          generate_release_notes: true
          body: |
            Automated build of `${{ github.ref_name }}`.

            **Debug APK SHA-256:** `${{ needs.build.outputs.apk_sha256 }}`
            **Release APK SHA-256:** `${{ needs.build.outputs.release_apk_sha256 }}`

            Install either APK via `adb install` or sideload, enable in LSPosed, scope to target apps. The release APK is signed with the Android debug keystore (this is an LSPosed module, not a Play target).
