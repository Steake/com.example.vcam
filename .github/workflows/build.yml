name: Build APK

on:
  push:
    branches: [main, master, "copilot/**"]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          VERSION=${GITHUB_REF_NAME//\//-}
          DEST="vcam-${VERSION}-debug.apk"
          cp "$APK" "$DEST"
          sha256sum "$DEST" | tee "${DEST}.sha256"
          echo "apk_path=$DEST" >> "$GITHUB_OUTPUT"
          echo "apk_sha256=$(sha256sum "$DEST" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcam-debug-apk
          path: |
            ${{ steps.apk.outputs.apk_path }}
            ${{ steps.apk.outputs.apk_path }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.apk.outputs.apk_path }}
            ${{ steps.apk.outputs.apk_path }}.sha256
          generate_release_notes: true
          body: |
            Automated build of `${{ github.ref_name }}`.

            **APK SHA-256:** `${{ steps.apk.outputs.apk_sha256 }}`

            Debug APK signed with the Android debug keystore. Install via `adb install` or sideload, enable in LSPosed, scope to target apps.
